<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ポイント・マイル管理{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --brand: #4f46e5;
      --brand-dark: #3730a3;
    }
    body { background: #f8f9fc; font-size: 0.95rem; }

    /* Navbar */
    .navbar { background: var(--brand) !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #c7d2fe !important; }
    .nav-link.active { font-weight: 600; color: #e0e7ff !important; }

    /* Cards */
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }

    /* Stat cards */
    .stat-card { border-left: 4px solid var(--brand); }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: var(--brand); }

    /* Badges */
    .badge-point_site { background:#6366f1; }
    .badge-mile       { background:#0ea5e9; }
    .badge-credit_card{ background:#10b981; }

    /* Expiry status rows */
    tr.row-expired  { background: #fff1f2; }
    tr.row-danger   { background: #fff1f2; }
    tr.row-warning  { background: #fffbeb; }

    /* Points input */
    .points-badge { font-size: 1rem; font-weight: 600; }

    /* Flash */
    .alert { border-radius: 10px; }

    /* Mobile tweaks */
    @media (max-width: 576px) {
      .hide-sm { display: none !important; }
      .table-sm td, .table-sm th { padding: .35rem .4rem; font-size: .82rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-md sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
      <i class="bi bi-stars me-1"></i>ポイント管理
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}"
             href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2 me-1"></i>ダッシュボード
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='site_list' %}active{% endif %}"
             href="{{ url_for('site_list') }}">
            <i class="bi bi-list-ul me-1"></i>サイト一覧
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link btn btn-sm ms-1 px-3"
             style="background:rgba(255,255,255,.2); border-radius:20px;"
             href="{{ url_for('add_site') }}">
            <i class="bi bi-plus-lg me-1"></i>新規登録
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
